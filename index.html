<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country Cards</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #f2f2f7, #e5e5ea);
    padding: 50px 20px;
    color: #1d1d1f;
}

.app {
    max-width: 1100px;
    margin: auto;
}

h1 {
    text-align: center;
    margin-bottom: 50px;
    font-weight: 600;
}

.cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
}

/* alap card */
.card {
    background: #ffffffcc;
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 18px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    transition: 0.3s ease;
}

.card:hover {
    transform: translateY(-6px);
}

/* NAGY képes card */
.card.large {
    grid-column: span 2;
    padding: 0;
    overflow: hidden;
}

.card.large img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
}

.card.large .content {
    padding: 20px;
}

.card.large h2 {
    margin: 0;
    font-weight: 600;
}

/* kicsi text card */
.card.small {
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
    padding: 25px 15px;
}

.label {
    font-size: 13px;
    opacity: 0.6;
    margin-bottom: 6px;
}

.value {
    font-size: 18px;
    font-weight: 600;
}

/* responsive */
@media (max-width: 900px) {
    .cards {
        grid-template-columns: repeat(2, 1fr);
    }

    .card.large {
        grid-column: span 2;
    }
}

@media (max-width: 500px) {
    .cards {
        grid-template-columns: 1fr;
    }

    .card.large {
        grid-column: span 1;
    }
}
</style>

</head>
<body>

<div class="app">
    <h1>Hungary Overview</h1>

    <div class="cards">

        <!-- NAGY FLAG CARD -->
        <div class="card large">
            <img src="https://flagcdn.com/w1280/hu.png" alt="Hungary Flag">
            <div class="content">
                <h2>Hungary 🇭🇺</h2>
            </div>
        </div>

        <!-- NAGY COAT CARD -->
        <div class="card large">
            <img src="https://mainfacts.com/media/images/coats_of_arms/hu.png" alt="Coat of Arms">
            <div class="content">
                <h2>Coat of Arms</h2>
            </div>
        </div>

        <!-- KICSI INFÓ CARDOK -->
        <div class="card small">
            <div class="label">Capital</div>
            <div class="value">Budapest</div>
        </div>

        <div class="card small">
            <div class="label">Population</div>
            <div class="value">9,600,000</div>
        </div>

        <div class="card small">
            <div class="label">Region</div>
            <div class="value">Central Europe</div>
        </div>

        <div class="card small">
            <div class="label">Area</div>
            <div class="value">93,030 km²</div>
        </div>

        <div class="card small">
            <div class="label">Currency</div>
            <div class="value">Hungarian Forint</div>
        </div>

        <div class="card small">
            <div class="label">Language</div>
            <div class="value">Hungarian</div>
        </div>

    </div>
</div>

</body>
</html>
